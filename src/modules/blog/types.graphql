type User {
  id: ID!
  name: String!
  email: String!
  posts: [Post!]!
}

type Post {
  id: ID!
  title: String!
  content: String!
  author: User!
  comments: [Comment!]!
}

type Comment {
  id: ID!
  content: String!
  post : Post!
  author: User!
  createdAt: String!
}

type PageInfo {
  page : Int!
  total : Int!
  hasMore : Boolean!
}

type PostList {
  posts: [Post!]!
  total: Int!
}

#input Types

input UpdateUserInput{
  name : String
  email : String
}

input CreatePostInput{
  title : String!
  content : String!
}
input CreateCommentInput{
  content : String!
  postId : ID!
}
