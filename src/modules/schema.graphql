type Query {
  messages: [Message!]!
  users:[User!]!
  user(id : ID!) : User
  posts : [Post!]!
  post(id : ID!) : Post
  userWithLoading(id : ID!) : User
  paginationPost( page : Int, limit: Int, sortBy: String) : [PostList!]!
}
type Mutation {
    postMessages(content: String!, author:String!): Message!
    updateUser(id : ID!, input : UpdateUserInput) : User!
    createPost(input : CreatePostInput!):Post!
    createComment(input : CreateCommentInput!): Comment!
    deleteComment(id : ID!): Boolean!
    simulateError : String!
}